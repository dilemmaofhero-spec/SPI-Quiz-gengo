<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SPI言語 適性検査シミュレーター</title>
<style>
  :root {
    --bg: #f5f4f1;
    --card-bg: #ffffff;
    --border: #d6d3d1;
    --border-light: #e7e5e4;
    --header-bg: #0f172a;
    --header-bg2: #1e293b;
    --header-text: #f8fafc;
    --accent-amber: #f5b400;
    --accent-rose: #e11d48;
    --accent-rose-dark: #be123c;
    --accent-rose-bg: #fff1f2;
    --text-main: #1c1917;
    --text-muted: #57534e;
    --text-faint: #a8a29e;
    --emerald: #059669;
    --emerald-bg: #ecfdf5;
    --slate: #334155;
    --slate-bg: #f1f5f9;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text-main);
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .serif {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "Times New Roman", serif;
  }
  #app-wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }
  #app {
    width: 100%;
    max-width: 640px;
  }
  .header-bar {
    background: var(--header-bg);
    color: var(--header-text);
    border-radius: 3px 3px 0 0;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent-amber);
    font-weight: 600;
    margin: 0 0 4px 0;
  }
  .header-title {
    font-size: 18px;
    letter-spacing: 0.02em;
    margin: 0;
  }
  .header-progress-label {
    font-size: 12px;
    color: #cbd5e1;
    margin: 0 0 2px 0;
    text-align: right;
  }
  .header-progress-value {
    font-size: 22px;
    margin: 0;
    text-align: right;
  }
  .header-progress-value span {
    font-size: 13px;
    color: #94a3b8;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 3px 3px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .card-inner { padding: 32px; }
  h2.title {
    font-size: 24px;
    margin: 0 0 16px 0;
  }
  p.lead {
    font-size: 14px;
    line-height: 1.8;
    color: #3f3c39;
    margin: 0 0 16px 0;
  }
  ul.info-list {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.9;
    margin: 0 0 24px 0;
    padding-left: 20px;
  }
  .small-label {
    font-size: 12px;
    color: var(--text-faint);
    margin: 0 0 8px 0;
  }
  .len-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 24px;
  }
  .len-btn {
    padding: 10px 0;
    border-radius: 3px;
    font-size: 14px;
    font-weight: 600;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--slate);
    cursor: pointer;
    transition: border-color .15s, background .15s, color .15s;
  }
  .len-btn:hover { border-color: var(--slate); }
  .len-btn.active {
    background: var(--header-bg);
    color: #fff;
    border-color: var(--header-bg);
  }
  .primary-btn {
    width: 100%;
    background: var(--accent-rose);
    color: #fff;
    font-weight: 700;
    font-size: 15px;
    padding: 14px 0;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: background .15s;
  }
  .primary-btn:hover { background: var(--accent-rose-dark); }
  .dark-btn {
    width: 100%;
    background: var(--header-bg);
    color: #fff;
    font-weight: 700;
    font-size: 15px;
    padding: 14px 0;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: background .15s;
  }
  .dark-btn:hover { background: var(--header-bg2); }

  .q-top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .cat-badge {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--slate);
    background: var(--slate-bg);
    padding: 4px 10px;
    border-radius: 3px;
  }
  .diff-stars {
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--accent-amber);
  }
  .prompt-text {
    font-size: 13px;
    color: var(--text-faint);
    margin: 0 0 8px 0;
  }
  .stem-box {
    background: #fafaf9;
    border: 1px solid var(--border-light);
    border-radius: 3px;
    padding: 18px;
    margin-bottom: 20px;
    font-size: 15px;
    line-height: 1.9;
    white-space: pre-line;
  }
  .choice-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 8px;
  }
  .choice-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    text-align: left;
    width: 100%;
    padding: 12px 16px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: #fff;
    font-size: 14px;
    color: var(--text-main);
    cursor: pointer;
    transition: border-color .12s, background .12s;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--slate);
    background: #fafaf9;
  }
  .choice-btn:disabled { cursor: default; }
  .choice-btn .letter {
    font-weight: 700;
    flex: none;
    width: 18px;
  }
  .choice-btn.correct {
    border-color: var(--emerald);
    background: var(--emerald-bg);
    color: #065f46;
  }
  .choice-btn.incorrect {
    border-color: var(--accent-rose);
    background: var(--accent-rose-bg);
    color: #9f1239;
  }
  .choice-btn.faded {
    border-color: var(--border-light);
    color: var(--text-faint);
  }
  .feedback-block {
    margin-top: 16px;
    border-top: 1px solid var(--border-light);
    padding-top: 16px;
  }
  .feedback-title {
    font-size: 14px;
    font-weight: 700;
    margin: 0 0 6px 0;
  }
  .feedback-title.correct { color: var(--emerald); }
  .feedback-title.incorrect { color: var(--accent-rose-dark); }
  .feedback-explanation {
    font-size: 13.5px;
    color: var(--text-muted);
    line-height: 1.8;
    margin: 0 0 16px 0;
  }

  /* result screen */
  .result-eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin: 0 0 4px 0;
  }
  .grade-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
  }
  .grade-circle {
    flex: none;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 4px solid var(--accent-rose);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .grade-circle span {
    font-size: 30px;
    color: var(--accent-rose-dark);
  }
  .grade-title { font-size: 17px; margin: 0 0 2px 0; }
  .grade-label { font-size: 14px; color: var(--text-muted); margin: 0; }
  .grade-desc {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.8;
    margin: 0 0 24px 0;
  }
  .gauge-wrap { margin-bottom: 24px; }
  .gauge-label { font-size: 12px; color: var(--text-faint); margin: 0 0 6px 0; }
  .gauge-track {
    display: flex;
    gap: 4px;
  }
  .gauge-seg {
    flex: 1;
    height: 12px;
    border-radius: 2px;
    background: var(--border-light);
  }
  .gauge-seg.past { background: #fcd34d; }
  .gauge-seg.current { background: var(--accent-rose); }
  .gauge-caption {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-faint);
    margin-top: 4px;
  }
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-box {
    background: #fafaf9;
    border: 1px solid var(--border-light);
    border-radius: 3px;
    padding: 12px;
  }
  .stat-label { font-size: 12px; color: var(--text-faint); margin: 0 0 2px 0; }
  .stat-value { font-size: 20px; margin: 0; }

  .cat-stats { margin-bottom: 24px; }
  .cat-stats-label { font-size: 12px; color: var(--text-faint); margin: 0 0 10px 0; }
  .cat-stat-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .cat-stat-name {
    font-size: 12px;
    width: 96px;
    flex: none;
    color: var(--text-muted);
  }
  .cat-stat-bar-bg {
    flex: 1;
    height: 8px;
    background: var(--border-light);
    border-radius: 2px;
    overflow: hidden;
  }
  .cat-stat-bar-fill {
    height: 100%;
    background: var(--slate);
  }
  .cat-stat-frac {
    font-size: 12px;
    width: 40px;
    flex: none;
    text-align: right;
    color: var(--text-faint);
  }

  .review-section { margin-top: 8px; margin-bottom: 24px; }
  .review-header {
    font-size: 15px;
    font-weight: 700;
    margin: 0 0 4px 0;
  }
  .review-sub {
    font-size: 12.5px;
    color: var(--text-faint);
    margin: 0 0 14px 0;
  }
  .review-item {
    border: 1px solid var(--border-light);
    border-left: 3px solid var(--accent-rose);
    border-radius: 3px;
    padding: 14px 16px;
    margin-bottom: 10px;
    background: #fffdfc;

  .review-item-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .review-item-num {
    font-size: 11px;
    color: var(--text-faint);
    font-weight: 700;
  }
  .review-stem {
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-line;
    margin: 0 0 10px 0;
  }
  .review-answer-line {
    font-size: 13px;
    margin: 0 0 4px 0;
    line-height: 1.7;
  }
  .review-answer-line .wrong-ans { color: var(--accent-rose-dark); font-weight: 700; }
  .review-answer-line .right-ans { color: var(--emerald); font-weight: 700; }
  .review-explanation {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.8;
    margin: 8px 0 0 0;
    padding-top: 8px;
    border-top: 1px dashed var(--border-light);
  }
  .all-correct-msg {
    font-size: 14px;
    color: var(--emerald);
    background: var(--emerald-bg);
    border-radius: 3px;
    padding: 14px 16px;
    margin-bottom: 24px;
  }
  .footnote {
    font-size: 11px;
    color: var(--text-faint);
    line-height: 1.7;
    margin-top: 14px;
  }
</style>
</head>

const QUIZ_LENGTH_OPTIONS = [10, 15, 20, 30, 40];
const START_ABILITY = 50;

/* 7段階の判定境界（careermine.jp記載の偏差値7段階を参考にしたシミュレーション値） */
const GRADE_BANDS = [
  { grade: 7, min: 70, label: "最上位クラス", desc: "上位2.3%相当。難関企業の基準を大きく上回る水準です。" },
  { grade: 6, min: 62, label: "上位クラス", desc: "上位11.5%相当。人気企業のボーダーを安定して超える水準です。" },
  { grade: 5, min: 54, label: "やや上位クラス", desc: "上位34.5%相当。多くの企業のボーダーを超えられる水準です。" },
  { grade: 4, min: 46, label: "標準クラス", desc: "全体の中央付近。一般的な企業の基準は満たしやすい水準です。" },
  { grade: 3, min: 38, label: "やや弱点クラス", desc: "基礎の見直しで得点アップが見込める水準です。" },
  { grade: 2, min: 30, label: "要対策クラス", desc: "頻出パターンの反復演習を重点的に行いたい水準です。" },
  { grade: 1, min: -Infinity, label: "基礎固めクラス", desc: "基本語彙・基本形式からじっくり固め直すのがおすすめです。" },
];

function getGrade(ability) {
  return GRADE_BANDS.find((b) => ability >= b.min);
}

function pickNextQuestion(pool, askedIds, targetDifficulty) {
  const available = pool.filter((q) => !askedIds.has(q.id));
  if (available.length === 0) return null;
  for (let radius = 0; radius <= 4; radius++) {
    const candidates = available.filter(
      (q) => Math.abs(q.difficulty - targetDifficulty) === radius
    );
    if (candidates.length > 0) {
      return candidates[Math.floor(Math.random() * candidates.length)];
    }
  }
  return available[Math.floor(Math.random() * available.length)];
}


/* =========================================================
   アプリの状態管理と描画（バニラJS）
   ========================================================= */
const state = {
  phase: "start", // start | quiz | result
  totalQuestions: 15,
  askedIds: new Set(),
  currentQuestion: null,
  difficulty: 3,
  ability: START_ABILITY,
  history: [], // {id, category, difficulty, correct, stem, choices, answer, selectedIndex, explanation}
  selected: null,
  answered: false,
  qIndex: 0,
};

const appEl = document.getElementById("app");

function startQuiz() {
  const first = pickNextQuestion(QUESTIONS, new Set(), 3);
  state.askedIds = new Set([first.id]);
  state.currentQuestion = first;
  state.difficulty = 3;
  state.ability = START_ABILITY;
  state.history = [];
  state.selected = null;
  state.answered = false;
  state.qIndex = 1;
  state.phase = "quiz";
  render();
}

function handleSelect(choiceIndex) {
  if (state.answered) return;
  const q = state.currentQuestion;
  const correct = choiceIndex === q.answer;
  state.selected = choiceIndex;
  state.answered = true;

  const delta = correct ? 3 + q.difficulty : -(3 + (6 - q.difficulty));
  state.ability = Math.max(0, Math.min(100, state.ability + delta));

  state.history.push({
    id: q.id,
    category: q.category,
    difficulty: q.difficulty,
    correct,
    stem: q.stem,
    choices: q.choices,
    answer: q.answer,
    selectedIndex: choiceIndex,
    explanation: q.explanation,
  });

  state.difficulty = correct
    ? Math.min(5, q.difficulty + 1)
    : Math.max(1, q.difficulty - 1);

  render();
}

function handleNext() {
  if (state.qIndex >= state.totalQuestions) {
    state.phase = "result";
    render();
    return;
  }
  const next = pickNextQuestion(QUESTIONS, state.askedIds, state.difficulty);
  if (!next) {
    state.phase = "result";
    render();
    return;
  }
  state.askedIds.add(next.id);
  state.currentQuestion = next;
  state.selected = null;
  state.answered = false;
  state.qIndex += 1;
  render();
}

function restart() {
  state.phase = "start";
  render();
}

function setTotalQuestions(n) {
  state.totalQuestions = n;
  render();
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function starString(difficulty) {
  return "★".repeat(difficulty) + "☆".repeat(5 - difficulty);
}

function render() {
  if (state.phase === "start") return renderStart();
  if (state.phase === "quiz") return renderQuiz();
  if (state.phase === "result") return renderResult();
}

function renderQuiz() {
  const q = state.currentQuestion;
  const letters = ["A", "B", "C", "D"];

  const choicesHtml = q.choices
    .map((choice, idx) => {
      let cls = "choice-btn";
      if (state.answered) {
        if (idx === q.answer) cls += " correct";
        else if (idx === state.selected) cls += " incorrect";
        else cls += " faded";
      }
      return `
        <button class="${cls}" data-idx="${idx}" ${state.answered ? "disabled" : ""}>
          <span class="letter">${letters[idx]}</span>
          <span>${escapeHtml(choice)}</span>
        </button>
      `;
    })
    .join("");

  let feedbackHtml = "";
  if (state.answered) {
    const isCorrect = state.selected === q.answer;
    feedbackHtml = `
      <div class="feedback-block">
        <p class="feedback-title ${isCorrect ? "correct" : "incorrect"}">${isCorrect ? "正解です" : "不正解です"}</p>
        <p class="feedback-explanation">${escapeHtml(q.explanation)}</p>
        <button class="dark-btn" id="next-btn">${state.qIndex >= state.totalQuestions ? "結果を見る" : "次の問題へ"}</button>
      </div>
    `;
  }

  appEl.innerHTML = `
    <div class="header-bar">
      <div>
        <p class="eyebrow">SPI Language Simulator</p>
        <h1 class="header-title serif">言語 適性検査シミュレーター</h1>
      </div>
      <div>
        <p class="header-progress-label">問題</p>
        <p class="header-progress-value serif">${state.qIndex}<span> / ${state.totalQuestions}</span></p>
      </div>
    </div>
    <div class="card">
      <div class="card-inner">
        <div class="q-top-row">
          <span class="cat-badge">${escapeHtml(q.category)}</span>
          <span class="diff-stars">難易度　${starString(q.difficulty)}</span>
        </div>
        <p class="prompt-text">${escapeHtml(q.prompt)}</p>
        <div class="stem-box serif">${escapeHtml(q.stem)}</div>
        <div class="choice-list">${choicesHtml}</div>
        ${feedbackHtml}
      </div>
    </div>
  `;

  if (!state.answered) {
    appEl.querySelectorAll(".choice-btn").forEach((btn) => {
      btn.addEventListener("click", () => handleSelect(Number(btn.dataset.idx)));
    });
  } else {
    const nextBtn = document.getElementById("next-btn");
    if (nextBtn) nextBtn.addEventListener("click", handleNext);
  }
}

function renderResult() {
  const grade = getGrade(state.ability);
  const correctCount = state.history.filter((h) => h.correct).length;
  const wrongItems = state.history.filter((h) => !h.correct);

  // 分野別正答率
  const catMap = {};
  state.history.forEach((h) => {
    if (!catMap[h.category]) catMap[h.category] = { correct: 0, total: 0 };
    catMap[h.category].total += 1;
    if (h.correct) catMap[h.category].correct += 1;
  });

  const gaugeSegs = [1, 2, 3, 4, 5, 6, 7]
    .map((g) => {
      let cls = "gauge-seg";
      if (g === grade.grade) cls += " current";
      else if (g < grade.grade) cls += " past";
      return `<div class="${cls}"></div>`;
    })
    .join("");

  const catStatsHtml = Object.entries(catMap)
    .map(([cat, s]) => {
      const pct = (s.correct / s.total) * 100;
      return `
        <div class="cat-stat-row">
          <span class="cat-stat-name">${escapeHtml(cat)}</span>
          <div class="cat-stat-bar-bg"><div class="cat-stat-bar-fill" style="width:${pct}%"></div></div>
          <span class="cat-stat-frac">${s.correct}/${s.total}</span>
        </div>
      `;
    })
    .join("");

  const letters = ["A", "B", "C", "D"];

  let reviewHtml = "";
  if (wrongItems.length === 0) {
    reviewHtml = `<div class="all-correct-msg">すべての問題に正解しました。素晴らしい結果です！</div>`;
  } else {
    const items = wrongItems
      .map((h, i) => {
        const choicesHtml = h.choices
          .map((c, idx) => `${letters[idx]}. ${escapeHtml(c)}`)
          .join("　");
        return `
          <div class="review-item">
            <div class="review-item-top">
              <span class="cat-badge">${escapeHtml(h.category)}</span>
              <span class="review-item-num">難易度 ${starString(h.difficulty)}</span>
            </div>
            <p class="review-stem serif">${escapeHtml(h.stem)}</p>
            <p class="review-answer-line">${choicesHtml}</p>
            <p class="review-answer-line">あなたの回答：<span class="wrong-ans">${letters[h.selectedIndex]}. ${escapeHtml(h.choices[h.selectedIndex])}</span></p>
            <p class="review-answer-line">正解：<span class="right-ans">${letters[h.answer]}. ${escapeHtml(h.choices[h.answer])}</span></p>
            <p class="review-explanation">${escapeHtml(h.explanation)}</p>
          </div>
        `;
      })
      .join("");
    reviewHtml = `
      <div class="review-section">
        <p class="review-header">間違えた問題の解説（${wrongItems.length}問）</p>
        <p class="review-sub">苦手なパターンを重点的に復習しましょう。</p>
        ${items}
      </div>
    `;
  }

  appEl.innerHTML = `
    <div class="header-bar">
      <div>
        <p class="eyebrow">SPI Language Simulator</p>
        <h1 class="header-title serif">言語 適性検査シミュレーター</h1>
      </div>
    </div>
    <div class="card">
      <div class="card-inner">
        <p class="result-eyebrow">RESULT</p>
        <h2 class="title serif">診断結果</h2>

        <div class="grade-row">
          <div class="grade-circle"><span class="serif">${grade.grade}</span></div>
          <div>
            <p class="grade-title serif">段階 ${grade.grade} ／ 7</p>
            <p class="grade-label">${escapeHtml(grade.label)}</p>
          </div>
        </div>
        <p class="grade-desc">${escapeHtml(grade.desc)}</p>

        <div class="gauge-wrap">
          <p class="gauge-label">7段階評価ゲージ</p>
          <div class="gauge-track">${gaugeSegs}</div>
          <div class="gauge-caption"><span>段階1</span><span>段階7</span></div>
        </div>

        <div class="stat-grid">
          <div class="stat-box">
            <p class="stat-label">正答数</p>
            <p class="stat-value serif">${correctCount} / ${state.history.length}</p>
          </div>
          <div class="stat-box">
            <p class="stat-label">到達難易度</p>
            <p class="stat-value serif">${starString(state.difficulty)}</p>
          </div>
        </div>

        <div class="cat-stats">
          <p class="cat-stats-label">分野別 正答率</p>
          ${catStatsHtml}
        </div>

        ${reviewHtml}

        <button class="primary-btn" id="restart-btn">もう一度挑戦する</button>
        <p class="footnote">※本判定は、正答率と到達難易度をもとにしたシミュレーションです。実際のSPIテストセンターの公式スコアとは算出方法が異なるため、目安としてご活用ください。</p>
      </div>
    </div>
  `;

  document.getElementById("restart-btn").addEventListener("click", restart);
}

render();
</script>
</body>
</html>
